<!DOCTYPE html>
{% load static %}
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Inventario Mejorado</title>
    <link rel="stylesheet" href="{% static 'assets/vendors/themify-icons/css/themify-icons.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/pigga.css' %}">
    <link rel="stylesheet" href="{% static 'assets/vendors/bootstrap/bootstrap.bundle.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/custom.css' %}"> <!-- CSS personalizado -->
</head>
<body>
    <header class="header header-mini" style="background-image: url('{% static 'assets/img/inventory-bg.jpg' %}');">
        <div class="header-title">Inventario</div>
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="{% static 'Home.html' %}">Home</a></li>
                <li class="breadcrumb-item active" aria-current="page">Inventario</li>
            </ol>
        </nav>
    </header>

    <div class="container mt-5">
        <h3>Inventario</h3>
        <hr>

        <button class="btn btn-success mb-3" onclick="mostrarFormulario()">Agregar Nuevo Insumo</button>

        <!-- Filtro por Tipo de Insumo -->
        <div class="mb-3">
            <form method="get" action="{% url 'filtrar_item' %}">
                <label for="tipoFiltro">Filtrar por Tipo:</label>
                <select id="tipoFiltro" name="tipo" class="form-control" onchange="this.form.submit()">
                    <option value="">Todos</option>
                    <option value="Vegetal">Vegetal</option>
                    <option value="Carne">Carne</option>
                    <option value="Grano">Grano</option>
                    <!-- Agrega más tipos según sea necesario -->
                </select>
            </form>
        </div>

        <!-- Formulario para Agregar/Editar Insumos -->
        <div id="formulario" style="display: none;">
            <h5>Agregar/Editar Insumo</h5>
            <form method="post" action="{% url 'guardar_item' %}">
                {% csrf_token %}
                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" class="form-control" id="nombre" name="nombre" required>
                </div>
                <div class="form-group">
                    <label for="tipo">Tipo</label>
                    <input type="text" class="form-control" id="tipo" name="tipo" required>
                </div>
                <div class="form-group">
                    <label for="cantidad">Cantidad</label>
                    <input type="number" class="form-control" id="cantidad" name="cantidad" required>
                </div>
                <div class="form-group">
                    <label for="caducidad">Fecha de Caducidad</label>
                    <input type="date" class="form-control" id="caducidad" name="caducidad" required>
                </div>
                <div class="form-group">
                    <label for="precio">Precio</label>
                    <input type="number" step="0.01" class="form-control" id="precio" name="precio" required>
                </div>
                <button type="submit" class="btn btn-primary">Guardar</button>
            </form>
            <hr>
        </div>

        <!-- Tabla de Inventario con opción de edición -->
        <table class="table table-striped">
            <thead>
                <tr>
                    <th scope="col">ID</th>
                    <th scope="col">Nombre</th>
                    <th scope="col">Tipo</th>
                    <th scope="col">Cantidad</th>
                    <th scope="col">Fecha de Caducidad</th>
                    <th scope="col">Precio</th>
                    <th scope="col">Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <form method="post" action="{% url 'guardar_item' 1 %}">
                        {% csrf_token %}
                        <th scope="row">1</th>
                        <td><input type="text" class="form-control" name="nombre" value="Tomate" required></td>
                        <td><input type="text" class="form-control" name="tipo" value="Vegetal" required></td>
                        <td><input type="number" class="form-control" name="cantidad" value="50" required></td>
                        <td><input type="date" class="form-control" name="caducidad" value="2023-12-31" required></td>
                        <td><input type="number" step="0.01" class="form-control" name="precio" value="1.50" required></td>
                        <td>
                            <button type="submit" class="btn btn-sm btn-primary">Guardar</button>
                        </td>
                    </form>
                </tr>
                <tr>
                    <form method="post" action="{% url 'guardar_item' 2 %}">
                        {% csrf_token %}
                        <th scope="row">2</th>
                        <td><input type="text" class="form-control" name="nombre" value="Pollo" required></td>
                        <td><input type="text" class="form-control" name="tipo" value="Carne" required></td>
                        <td><input type="number" class="form-control" name="cantidad" value="30" required></td>
                        <td><input type="date" class="form-control" name="caducidad" value="2023-11-15" required></td>
                        <td><input type="number" step="0.01" class="form-control" name="precio" value="5.00" required></td>
                        <td>
                            <button type="submit" class="btn btn-sm btn-primary">Guardar</button>
                        </td>
                    </form>
                </tr>
                <tr>
                    <form method="post" action="{% url 'guardar_item' 3 %}">
                        {% csrf_token %}
                        <th scope="row">3</th>
                        <td><input type="text" class="form-control" name="nombre" value="Arroz" required></td>
                        <td><input type="text" class="form-control" name="tipo" value="Grano" required></td>
                        <td><input type="number" class="form-control" name="cantidad" value="100" required></td>
                        <td><input type="date" class="form-control" name="caducidad" value="2025-01-01" required></td>
                        <td><input type="number" step="0.01" class="form-control" name="precio" value="0.80" required></td>
                        <td>
                            <button type="submit" class="btn btn-sm btn-primary">Guardar</button>
                        </td>
                    </form>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Scripts -->
    <script src="{% static 'assets/vendors/jquery/jquery-3.4.1.js' %}"></script>
    <script src="{% static 'assets/vendors/bootstrap/bootstrap.bundle.js' %}"></script>
    <script>
        function mostrarFormulario() {
            document.getElementById('formulario').style.display = 'block';
        }
    </script>
</body>
</html>
